name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build release APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: english-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign
      - name: Create IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r english-app.ipa Payload/
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: english-app-ipa
          path: build/ios/ipa/english-app.ipa

  release:
    name: Create Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: english-app-apk
          path: artifacts/

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: english-app-ipa
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/app-release.apk release/english-app-${{ github.ref_name }}.apk
          cp artifacts/english-app.ipa release/english-app-${{ github.ref_name }}.ipa
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body: |
            ## English Muscle Memory ${{ github.ref_name }}

            ### Downloads
            - **Android**: Download and install `english-app-${{ github.ref_name }}.apk`
            - **iOS**: Download `english-app-${{ github.ref_name }}.ipa` and install via AltStore or similar

            ### What's New
            See the commit history for changes.
          files: release/*
          generate_release_notes: true
