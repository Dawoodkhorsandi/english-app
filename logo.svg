<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5"/>
      <stop offset="100%" style="stop-color:#1E88E5"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  
  <!-- Dumbbell bar -->
  <rect x="120" y="230" width="272" height="24" rx="12" fill="white" opacity="0.95"/>
  
  <!-- Left weight plates -->
  <rect x="90" y="190" width="20" height="104" rx="8" fill="url(#accent)"/>
  <rect x="60" y="200" width="20" height="84" rx="8" fill="white" opacity="0.9"/>
  
  <!-- Right weight plates -->
  <rect x="402" y="190" width="20" height="104" rx="8" fill="url(#accent)"/>
  <rect x="432" y="200" width="20" height="84" rx="8" fill="white" opacity="0.9"/>
  
  <!-- Speech bubble -->
  <path d="M 170 320 Q 170 290 200 290 L 312 290 Q 342 290 342 320 L 342 370 Q 342 400 312 400 L 240 400 L 210 430 L 215 400 L 200 400 Q 170 400 170 370 Z" fill="white" opacity="0.95"/>
  
  <!-- "En" text in speech bubble -->
  <text x="256" y="368" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="700" fill="#1565C0">En</text>
  
  <!-- Small decorative dots -->
  <circle cx="180" cy="140" r="6" fill="white" opacity="0.3"/>
  <circle cx="340" cy="120" r="4" fill="white" opacity="0.2"/>
  <circle cx="100" cy="350" r="5" fill="white" opacity="0.25"/>
  <circle cx="400" cy="380" r="4" fill="white" opacity="0.2"/>
</svg>
