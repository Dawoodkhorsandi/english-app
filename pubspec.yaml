name: english_app
description: "English Learning Mobile App - AI-powered English practice with spaced repetition"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State management
  flutter_riverpod: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # HTTP
  dio: ^5.8.0+1
  
  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  
  # UI
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  
  # Utils
  url_launcher: ^6.3.1
  intl: ^0.20.2
  crypto: ^3.0.6
  vector_math: ^2.1.4
  pretty_dio_logger: ^1.4.0
  package_info_plus: ^9.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
