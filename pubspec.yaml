name: english_app
description: "Engram - AI-powered English learning with spaced repetition"
publish_to: 'none'
version: 1.7.3+18

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State management
  flutter_riverpod: ^2.6.1
  
  # HTTP
  dio: ^5.8.0+1
  
  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  
  # UI
  shimmer: ^3.0.0
  share_plus: ^12.0.0

  # Utils
  url_launcher: ^6.3.1
  intl: ^0.20.2
  crypto: ^3.0.6
  vector_math: ^2.1.4
  pretty_dio_logger: ^1.4.0
  package_info_plus: ^9.0.1
  google_sign_in: ^7.2.0
  record: ^5.1.2
  path_provider: ^2.1.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
